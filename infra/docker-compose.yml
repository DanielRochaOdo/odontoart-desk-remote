version: "3.9"
services:
  signaling:
    build:
      context: ../server
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=change-this-to-a-long-random-secret
      - JWT_ISSUER=remote-support
      - JWT_AUDIENCE=remote-support-clients
      - SESSION_CODE_TTL_MIN=10
      - SESSION_TOKEN_TTL_MIN=30
      - CONTROLLER_TOKEN_TTL_MIN=30
      - TECH_EMAIL=tech@example.com
      - TECH_PASSWORD=ChangeMe123!
    ports:
      - "8080:8080"

  coturn:
    image: coturn/coturn:4.6.2
    command: ["-c", "/etc/coturn/turnserver.conf"]
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/tcp"
      - "49160-49200:49160-49200/udp"
